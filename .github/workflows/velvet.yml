# Build + deploy the Velvet front-end (https://github.com/phranck/velvet) to
# GitHub Pages. Replaces Upptime's stock "Static Site CI" (which is disabled).
# Velvet fetches the monitoring data at runtime, so this only needs to run when
# the config/branding changes, on manual dispatch, or on the static_site rebuild
# event that deploy-announce.yml fires.
name: Velvet
on:
  push:
    paths:
      - ".upptimerc.yml"
      - "assets/**"
      - ".github/workflows/velvet.yml"
  repository_dispatch:
    types: [static_site]
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: velvet-${{ github.ref }}
  cancel-in-progress: false
jobs:
  build:
    name: Build and deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Velvet site
        uses: phranck/velvet@v1
        with:
          config: .upptimerc.yml
          output: velvet-dist
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GH_PAT || github.token }}
          publish_dir: velvet-dist
          cname: status.musiccloud.io
          user_name: "Velvet Bot"
          user_email: "actions@users.noreply.github.com"
