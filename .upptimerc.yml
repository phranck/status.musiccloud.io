# MusicCloud status page — powered by Upptime, rendered by Velvet.
# Velvet front-end: https://github.com/phranck/velvet
# Spec: musiccloud repo → docs/superpowers/specs/2026-06-26-status-page-theme-design.md (MC-062)
#
# NOTE: All hosts are dual-stack (A + AAAA). Each service has an IPv4 check (run
# from the GitHub runner) plus an IPv6 check via Globalping (explicit slug
# "<base>-ipv6"); Velvet folds the pair into one card. Globalping uses the
# GLOBALPING_TOKEN repo secret. Every service is probed through a uniform
# api.musiccloud.io/health/<service> endpoint: the backend (which shares the
# dual-stack network) reaches each app and answers with a consistent JSON status.

owner: phranck
repo: status.musiccloud.io

sites:
  - name: Website
    slug: frontend
    url: https://api.musiccloud.io/health/frontend
  - name: Website IPv6
    slug: frontend-ipv6
    url: https://api.musiccloud.io/health/frontend
    type: globalping
    check: http
    ipv6: true
  - name: Dashboard
    url: https://api.musiccloud.io/health/dashboard
  - name: Dashboard IPv6
    slug: dashboard-ipv6
    url: https://api.musiccloud.io/health/dashboard
    type: globalping
    check: http
    ipv6: true
  - name: Developer Site
    url: https://api.musiccloud.io/health/developer
  - name: Developer Site IPv6
    slug: developer-site-ipv6
    url: https://api.musiccloud.io/health/developer
    type: globalping
    check: http
    ipv6: true
  - name: Backend
    url: https://api.musiccloud.io/health/backend
  - name: Backend IPv6
    slug: backend-ipv6
    url: https://api.musiccloud.io/health/backend
    type: globalping
    check: http
    ipv6: true
  - name: Database
    url: https://api.musiccloud.io/health/db
  - name: Database IPv6
    slug: database-ipv6
    url: https://api.musiccloud.io/health/db
    type: globalping
    check: http
    ipv6: true
  - name: Email
    url: https://api.musiccloud.io/health/email
  - name: Email IPv6
    slug: email-ipv6
    url: https://api.musiccloud.io/health/email
    type: globalping
    check: http
    ipv6: true

status-website:
  cname: status.musiccloud.io
  name: musiccloud.io
  logoUrl: https://musiccloud.io/img/musiccloud-banner-very-small.svg
  # No navbar links: the logo links to "/" (Status); History + GitHub removed.
  navbar: []
  # Velvet front-end configuration (https://github.com/phranck/velvet).
  velvet:
    # One card per service (vs. "grouped", all services in a single card).
    layout: cards
    logoHeight: 72
    # First-visit history window (visitors who pick another range keep it).
    defaultRange: 90d
    accent: "#6366f1"
    accentDeg: "#d29922"
    accentDown: "#f85149"
    # Visitor analytics (self-hosted Umami).
    umami:
      websiteId: "79070b89-ea23-4959-a677-ccfe37e2cc46"
      src: "https://umami.layered.work/script.js"
    icons:
      frontend: ph-globe
      backend: ph-gear-six
      database: ph-database
      email: ph-envelope-simple
      dashboard: ph-gauge
      developer-site: ph-code
