# MusicCloud status page — powered by Upptime, rendered by Velvet.
# Velvet front-end: https://github.com/phranck/velvet
# Spec: musiccloud repo → docs/superpowers/specs/2026-06-26-status-page-theme-design.md (MC-062)
#
# NOTE: Dashboard + Developer Site are monitored THROUGH the backend
# (api.musiccloud.io/health/dashboard|developer), not their own subdomains:
# dashboard./developer. are IPv6-only on Zerops and the IPv4-only GitHub Actions
# runners can't reach them directly. The backend sits in the dual-stack Zerops
# network and proxies the liveness check. Frontend (apex) is dual-stack.

owner: phranck
repo: status.musiccloud.io

sites:
  - name: Frontend
    url: https://musiccloud.io
  - name: Backend
    url: https://api.musiccloud.io/health
  - name: Database
    url: https://api.musiccloud.io/health/ready
  - name: Email
    url: https://api.musiccloud.io/health/email
  - name: Dashboard
    url: https://api.musiccloud.io/health/dashboard
  - name: Developer Site
    url: https://api.musiccloud.io/health/developer

status-website:
  cname: status.musiccloud.io
  name: musiccloud.io
  logoUrl: https://musiccloud.io/img/musiccloud-banner-very-small.svg
  # No navbar links: the logo links to "/" (Status); History + GitHub removed.
  navbar: []
  # Velvet front-end configuration (https://github.com/phranck/velvet).
  velvet:
    # One card per service (vs. "grouped", all services in a single card).
    layout: cards
    accent: "#6366f1"
    accentDeg: "#d29922"
    accentDown: "#f85149"
    icons:
      frontend: ph-globe
      backend: ph-gear-six
      database: ph-database
      email: ph-envelope-simple
      dashboard: ph-gauge
      developer-site: ph-code
