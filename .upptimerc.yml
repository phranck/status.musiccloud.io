# MusicCloud status page — powered by Upptime, rendered by Velvet.
# Velvet front-end: https://github.com/phranck/velvet
# Spec: musiccloud repo → docs/superpowers/specs/2026-06-26-status-page-theme-design.md (MC-062)
#
# NOTE: api.musiccloud.io (Backend/Database/Email) is currently IPv6-only on
# Zerops; GitHub Actions runners are IPv4-only, so Upptime marks them down even
# though they serve 200. Fix: give the subdomains IPv4 (Cloudflare proxy or a
# Zerops IPv4 add-on). Frontend (apex) is dual-stack and unaffected.

owner: phranck
repo: status.musiccloud.io

sites:
  - name: Frontend
    url: https://musiccloud.io
  - name: Backend
    url: https://api.musiccloud.io/health
  - name: Database
    url: https://api.musiccloud.io/health/ready
  - name: Email
    url: https://api.musiccloud.io/health/email
  - name: Dashboard
    url: https://dashboard.musiccloud.io
  - name: Developer Site
    url: https://developer.musiccloud.io

status-website:
  cname: status.musiccloud.io
  name: musiccloud.io
  logoUrl: https://musiccloud.io/icons/apple-touch-icon.png
  navbar:
    - title: Status
      href: /
    - title: History
      href: https://github.com/$OWNER/$REPO/issues
    - title: GitHub
      href: https://github.com/$OWNER/$REPO
  # Velvet front-end configuration (https://github.com/phranck/velvet).
  velvet:
    accent: "#6366f1"
    accentDeg: "#d29922"
    accentDown: "#f85149"
    icons:
      frontend: ph-globe
      backend: ph-gear-six
      database: ph-database
      email: ph-envelope-simple
      dashboard: ph-gauge
      developer-site: ph-code
