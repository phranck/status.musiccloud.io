# MusicCloud status page — powered by Upptime.
# Theme + rationale: musiccloud repo → docs/superpowers/specs/2026-06-26-status-page-theme-design.md
# Plan: .claude/plans/open/2026-06-26-status-page-musiccloud.md (MC-062)

owner: phranck
repo: status.musiccloud.io

sites:
  - name: Frontend
    url: https://musiccloud.io
  - name: API
    url: https://api.musiccloud.io/health/ready
  - name: Dashboard
    url: https://dashboard.musiccloud.io
  - name: Developer Site
    url: https://developer.musiccloud.io
  # Email (SMTP2GO) — blocked on the email-provider migration (backend still uses
  # Brevo as of 2026-06-26). Add once GET https://api.musiccloud.io/health/email exists:
  # - name: Email
  #   url: https://api.musiccloud.io/health/email

status-website:
  cname: status.musiccloud.io
  name: MusicCloud
  # TODO(betreiber): swap for a square logo/SVG; this is a placeholder.
  logoUrl: https://musiccloud.io/og/musiccloud.jpg
  introTitle: "**MusicCloud** — live service status"
  introMessage: "Real-time status of MusicCloud services, powered by GitHub. Follow incidents on the [History](/history) page or watch the [repository](https://github.com/phranck/status.musiccloud.io)."
  theme: dark
  navbar:
    - title: Status
      href: /
    - title: History
      href: /history
    - title: GitHub
      href: https://github.com/$OWNER/$REPO
  # Fonts (Inter + JetBrains Mono) and Phosphor Duotone icon font.
  customHeadHtml: >-
    <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap"><link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.2/src/duotone/style.css">
  # Dark-indigo theme. Overrides the built-in `dark` theme variables + a few
  # structural rules on Upptime's stock DOM (article.up/.degraded/.down, nav, .tag, h1).
  # Pixel details (per-service icons, 90-day bars) are an iterative follow-up.
  css: |
    :root {
      --mc-accent: #6366f1;
      --body-background-color: #0a0b0f;
      --body-text-color: #e8eaed;
      --card-background-color: rgba(14, 16, 21, .82);
      --card-border-color: #1c2029;
      --nav-background-color: transparent;
      --nav-border-bottom-color: #14171f;
      --nav-current-border-bottom-color: var(--mc-accent);
      --up-border-left-color: var(--mc-accent);
      --degraded-border-left-color: #d29922;
      --down-border-left-color: #f85149;
      --down-background-color: #241015;
      --tag-color: #ffffff;
      --tag-up-background-color: var(--mc-accent);
      --tag-down-background-color: #f85149;
      --tag-degraded-background-color: #d29922;
      --change-background-color: var(--mc-accent);
      --code-color: #c7cbff;
      --code-background-color: #15172a;
      --submit-button-background-color: var(--mc-accent);
      --submit-button-border-color: transparent;
      --submit-button-color: #ffffff;
      --error-button-background-color: var(--mc-accent);
      --error-button-border-color: transparent;
      --error-button-color: #ffffff;
      --graph-opacity: .9;
      --graph-filter: none;
    }
    body {
      background: radial-gradient(120% 70% at 50% -8%, #1a1d2b 0%, #0c0d12 44%, #0a0b0f 100%) no-repeat fixed;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .container { max-width: 760px; }
    h1 {
      font-weight: 700;
      letter-spacing: -.03em;
      background: linear-gradient(180deg, #ffffff 0%, #c3c9d4 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    h3 { letter-spacing: .05em; text-transform: uppercase; font-size: .8em; opacity: .55; }
    nav { background: transparent; -webkit-backdrop-filter: blur(6px); backdrop-filter: blur(6px); }
    nav a[aria-current] { color: var(--mc-accent); }
    article {
      border-radius: 14px;
      border: 1px solid var(--card-border-color);
      box-shadow: 0 1px 2px rgba(0, 0, 0, .3);
    }
    .tag {
      border-radius: 999px;
      font-weight: 600;
      letter-spacing: .02em;
      padding: .28rem .66rem;
    }
    code, time { font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace; }
    a { text-decoration: none; }
