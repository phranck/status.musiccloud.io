# MusicCloud status page — powered by Upptime, rendered by Velvet.
# Velvet front-end: https://github.com/phranck/velvet
# Spec: musiccloud repo → docs/superpowers/specs/2026-06-26-status-page-theme-design.md (MC-062)

owner: phranck
repo: status.musiccloud.io

sites:
  - name: Frontend
    url: https://musiccloud.io
  - name: API
    url: https://api.musiccloud.io/health/ready
  - name: Dashboard
    url: https://dashboard.musiccloud.io
  - name: Developer Site
    url: https://developer.musiccloud.io
  # Email (SMTP2GO) — blocked on the email-provider migration (backend still uses
  # Brevo as of 2026-06-26). Add once GET https://api.musiccloud.io/health/email exists:
  # - name: Email
  #   url: https://api.musiccloud.io/health/email

status-website:
  cname: status.musiccloud.io
  name: MusicCloud
  # TODO(betreiber): swap for a square logo/SVG; this is a placeholder.
  logoUrl: https://musiccloud.io/og/musiccloud.jpg
  navbar:
    - title: Status
      href: /
    - title: History
      href: https://github.com/$OWNER/$REPO/issues
    - title: GitHub
      href: https://github.com/$OWNER/$REPO
  # Velvet front-end configuration (https://github.com/phranck/velvet).
  velvet:
    accent: "#6366f1"
    accentDeg: "#d29922"
    accentDown: "#f85149"
    icons:
      frontend: ph-globe
      api: ph-brackets-curly
      dashboard: ph-gauge
      developer-site: ph-code
